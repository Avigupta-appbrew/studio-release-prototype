<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio — Releases</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', 'Inter', ui-sans-serif, system-ui; background: #F9FAFB; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 99px; }
textarea, input, select { font-family: 'Outfit', 'Inter', ui-sans-serif, system-ui; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.35} }
.pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── Design tokens ──────────────────────────────────────────────────────── */
const T = {
  /* blues */
  ctaBg:      '#0033A0',   /* primary CTA — dark navy                         */
  ctaHov:     '#002B87',
  blue:       '#005DFF',   /* interactive — radios, checkboxes, outlined btn  */
  blue50:     '#EBF6FF',
  blue100:    '#D1ECFF',
  /* danger */
  red:        '#FC401F',
  red50:      '#FFF2ED',
  red100:     '#FFE2D4',
  red200:     '#FFC1A9',
  red700:     '#C4100A',
  red900:     '#7D1112',
  /* success */
  green:      '#16A34A',
  green50:    '#F0FDF4',
  /* neutrals — from Figma node 1:17560 */
  sidebar:    '#1E2939',
  white:      '#FFFFFF',
  pageBg:     '#F9FAFB',   /* gray/50  */
  inputBd:    '#E5E7EB',   /* gray/200 — borders for inputs AND cards          */
  border:     '#E5E7EB',   /* gray/200                                         */
  muted:      '#F9FAFB',   /* gray/50  */
  text:       '#1E2939',   /* gray/800 — primary text                          */
  textMd:     '#374151',   /* gray/700                                         */
  textLt:     '#6a7282',   /* gray/500                                         */
  textXlt:    '#9CA3AF',   /* gray/400                                         */
};

/* ─── SVG icons (24×24 viewbox, fill=currentColor) ──────────────────────── */
const PATHS = {
  design:       'M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z',
  analytics:    'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z',
  tag:          'M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z',
  bell:         'M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z',
  rocket:       'M13.13 22.19L11.5 18.36C13.07 17.78 14.54 17 15.9 16.09L13.13 22.19M5.64 12.5L1.81 10.87 7.91 8.1C7 9.46 6.22 10.93 5.64 12.5M19.22 4C19.5 4 19.75 4 20 4.05C20.55 9.19 18.5 14 15 17.43L6.57 9C10 5.5 14.81 3.45 19.22 4M8 12C8 12 4 14.69 4 17.31C4 19.9 6.1 22 8.69 22C11.31 22 14 18 14 18L8 12Z',
  settings:     'M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z',
  check:        'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z',
  close:        'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z',
  copy:         'M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z',
  download:     'M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z',
  external:     'M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z',
  arrowRight:   'M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z',
  warning:      'M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z',
  info:         'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z',
  chevronDown:  'M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z',
  chevronRight: 'M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z',
  mail:         'M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z',
  checkCircle:  'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z',
  alertCircle:  'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z',
  store:        'M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z',
  refresh:      'M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z',
};

const Ic = ({ n, sz = 16, col = 'currentColor', style: s = {} }) => (
  <svg width={sz} height={sz} viewBox="0 0 24 24" fill={col} style={{ flexShrink: 0, display: 'block', ...s }}>
    {n === 'apple' ? (
      <><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83z" /><path d="M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" /></>
    ) : n === 'android' ? (
      <><path d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5S11 23.33 11 22.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V8H6v10zm-2.5-1C2.67 17 2 16.33 2 15.5v-7C2 7.67 2.67 7 3.5 7S5 7.67 5 8.5v7c0 .83-.67 1.5-1.5 1.5zm17 0c-.83 0-1.5-.67-1.5-1.5v-7c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v7c0 .83-.67 1.5-1.5 1.5zM15.53 2.16l1.3-1.3c.2-.2.2-.51 0-.71-.2-.2-.51-.2-.71 0l-1.48 1.48A5.84 5.84 0 0012 1c-.96 0-1.86.23-2.66.63L7.85.15c-.2-.2-.51-.2-.71 0-.2.2-.2.51 0 .71l1.31 1.31A5.948 5.948 0 006 7h12c0-1.99-.97-3.75-2.47-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z" /></>
    ) : (
      <path d={PATHS[n] || ''} />
    )}
  </svg>
);

/* ─── Primitives ─────────────────────────────────────────────────────────── */

/* Section header — Figma: Outfit Medium 13px uppercase #1E2939 */
const SecHead = ({ children, right }) => (
  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
    <span style={{ fontSize: 13, fontWeight: 600, color: T.text, textTransform: 'uppercase', letterSpacing: '0.07em' }}>{children}</span>
    {right}
  </div>
);

/* Field label — Outfit Medium 12px #6a7282 */
const FieldLabel = ({ children }) => (
  <div style={{ fontSize: 12, fontWeight: 500, color: T.textLt, marginBottom: 6 }}>{children}</div>
);

/* Input — border #E5E7EB, borderRadius 8, padding 10px */
const Input = ({ value, onChange, placeholder, type = 'text', prefix, rows, style: extra = {} }) => {
  const [focus, setFocus] = useState(false);
  const base = {
    width: '100%', border: `1px solid ${focus ? T.blue : T.border}`,
    borderRadius: 8, padding: rows ? '10px 12px' : '9px 12px',
    fontSize: 13, color: T.text, outline: 'none', background: T.white,
    fontFamily: 'Outfit, Inter, sans-serif', lineHeight: 1.5, ...extra,
  };
  if (rows) return (
    <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
      style={{ ...base, resize: 'vertical' }}
      onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} />
  );
  if (prefix) return (
    <div style={{ display: 'flex', border: `1px solid ${focus ? T.blue : T.border}`, borderRadius: 8, overflow: 'hidden', background: T.white }}>
      <span style={{ padding: '9px 12px', borderRight: `1px solid ${T.border}`, fontSize: 13, color: T.textLt, background: T.muted, flexShrink: 0 }}>{prefix}</span>
      <input type={type} value={value} onChange={onChange} placeholder={placeholder}
        style={{ border: 'none', outline: 'none', flex: 1, padding: '9px 12px', fontSize: 13, color: T.text, fontFamily: 'Outfit, Inter, sans-serif' }}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} />
    </div>
  );
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder}
    style={base} onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} />;
};

/* Checkbox — blue fill when checked */
const Checkbox = ({ checked, onChange, label }) => (
  <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
    <div onClick={() => onChange(!checked)} style={{
      width: 16, height: 16, borderRadius: 4, flexShrink: 0,
      background: checked ? T.blue : T.white,
      border: `1.5px solid ${checked ? T.blue : T.border}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      {checked && <Ic n="check" sz={11} col="#fff" />}
    </div>
    {label && <span style={{ fontSize: 13, color: T.textMd }}>{label}</span>}
  </label>
);

/* Radio card — Figma: border 1.5px #005dff active, borderRadius 8 */
const RadioCard = ({ checked, onChange, label, desc }) => (
  <div onClick={onChange} style={{
    display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
    border: `1.5px solid ${checked ? T.blue : T.border}`, borderRadius: 8,
    cursor: 'pointer', flex: 1, background: T.white, transition: 'border-color .15s',
  }}>
    <div style={{
      width: 16, height: 16, borderRadius: '50%', flexShrink: 0,
      border: `2px solid ${checked ? T.blue : '#CBD5E1'}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      {checked && <div style={{ width: 7, height: 7, borderRadius: '50%', background: T.blue }} />}
    </div>
    <div>
      <div style={{ fontSize: 13, fontWeight: 500, color: T.text }}>{label}</div>
      {desc && <div style={{ fontSize: 11, color: T.textLt, marginTop: 1 }}>{desc}</div>}
    </div>
  </div>
);

/* Primary CTA button — dark navy #0033A0, borderRadius 8 */
const BtnPrimary = ({ children, onClick, disabled, icon, style: extra = {}, fullWidth }) => (
  <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
    background: disabled ? '#9CA3AF' : T.ctaBg, color: '#fff',
    border: 'none', borderRadius: 8, padding: '9px 18px', fontSize: 13, fontWeight: 600,
    cursor: disabled ? 'not-allowed' : 'pointer', fontFamily: 'Outfit, Inter, sans-serif',
    width: fullWidth ? '100%' : 'auto', transition: 'background .15s', ...extra,
  }}
    onMouseEnter={e => { if (!disabled) e.currentTarget.style.background = T.ctaHov; }}
    onMouseLeave={e => { if (!disabled) e.currentTarget.style.background = T.ctaBg; }}>
    {icon && <Ic n={icon} sz={14} col="#fff" />}
    {children}
  </button>
);

/* Outlined button — blue border, borderRadius 8 */
const BtnOutline = ({ children, onClick, icon, style: extra = {} }) => (
  <button onClick={onClick} style={{
    display: 'inline-flex', alignItems: 'center', gap: 6,
    background: T.white, color: T.blue,
    border: `1.5px solid ${T.blue}`, borderRadius: 8, padding: '7px 14px', fontSize: 13, fontWeight: 500,
    cursor: 'pointer', fontFamily: 'Outfit, Inter, sans-serif', transition: 'background .12s', ...extra,
  }}
    onMouseEnter={e => e.currentTarget.style.background = T.blue50}
    onMouseLeave={e => e.currentTarget.style.background = T.white}>
    {icon && <Ic n={icon} sz={14} col={T.blue} />}
    {children}
  </button>
);

/* Ghost / text link button */
const BtnGhost = ({ children, onClick, style: extra = {} }) => (
  <button onClick={onClick} style={{
    background: 'none', border: 'none', color: T.textLt, fontSize: 13,
    cursor: 'pointer', fontFamily: 'Outfit, Inter, sans-serif', padding: '7px 12px',
    display: 'inline-flex', alignItems: 'center', gap: 6, borderRadius: 8,
    transition: 'background .12s', ...extra,
  }}
    onMouseEnter={e => e.currentTarget.style.background = T.pageBg}
    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
    {children}
  </button>
);

/* Release dropdown CTA — single button, two options with subtext */
const ReleaseDropdown = ({ go }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const opts = [
    {
      icon: 'rocket', screen: 2,
      label: 'Create test release',
      desc:  'Build and install on a device before going live',
    },
    {
      icon: 'store', screen: 5,
      label: 'Release to stores',
      desc:  'Submit v1.7.0 directly to App Store & Google Play',
    },
  ];

  return (
    <div ref={ref} style={{ position: 'relative', display: 'inline-flex' }}>
      {/* Main button */}
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: T.ctaBg, color: '#fff', border: 'none',
          borderRadius: 8, padding: '9px 16px',
          fontSize: 13, fontWeight: 600, cursor: 'pointer',
          fontFamily: 'Outfit, Inter, sans-serif', transition: 'background .15s',
        }}
        onMouseEnter={e => e.currentTarget.style.background = T.ctaHov}
        onMouseLeave={e => e.currentTarget.style.background = T.ctaBg}
      >
        Create release
        <span style={{ width: 1, height: 14, background: 'rgba(255,255,255,0.28)', flexShrink: 0 }} />
        <Ic n="chevronDown" sz={14} col="#fff"
          style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform .18s', flexShrink: 0 }} />
      </button>

      {/* Dropdown panel */}
      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 6px)', right: 0,
          background: T.white, border: `1px solid ${T.border}`, borderRadius: 12,
          boxShadow: '0 8px 24px rgba(0,21,64,0.10), 0 2px 8px rgba(0,21,64,0.06)',
          overflow: 'hidden', minWidth: 300, zIndex: 200,
        }}>
          {opts.map((o, i) => (
            <button
              key={o.screen}
              onClick={() => { setOpen(false); go(o.screen); }}
              style={{
                width: '100%', display: 'flex', alignItems: 'center', gap: 14,
                padding: '14px 16px', background: 'transparent',
                border: 'none', borderBottom: i < opts.length - 1 ? `1px solid ${T.border}` : 'none',
                cursor: 'pointer', textAlign: 'left', transition: 'background .12s',
              }}
              onMouseEnter={e => e.currentTarget.style.background = T.pageBg}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
              <div style={{
                width: 36, height: 36, borderRadius: 8, flexShrink: 0,
                background: T.blue50, display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Ic n={o.icon} sz={17} col={T.ctaBg} />
              </div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.text, marginBottom: 2 }}>{o.label}</div>
                <div style={{ fontSize: 12, color: T.textLt, lineHeight: 1.4 }}>{o.desc}</div>
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

/* Divider */
const Divider = () => <div style={{ height: 1, background: T.border, margin: '20px 0' }} />;

/* Status badge */
const Badge = ({ status }) => {
  const map = {
    Live:          { bg: '#F0FDF4', text: '#15803D', dot: '#16A34A' },
    'In Review':   { bg: '#FFFBEB', text: '#B45309', dot: '#D97706' },
    Failed:        { bg: '#FFF2ED', text: '#C4100A', dot: T.red     },
    Building:      { bg: T.blue50,  text: T.ctaBg,   dot: T.blue    },
    Signing:       { bg: '#F5F3FF', text: '#6D28D9',  dot: '#7C3AED' },
    Queued:        { bg: T.muted,   text: T.textLt,   dot: T.textXlt },
    Rejected:      { bg: '#FFF2ED', text: '#C4100A', dot: T.red     },
    'Not set up':  { bg: T.muted,   text: T.textLt,   dot: T.textXlt },
    Connected:     { bg: '#F0FDF4', text: '#15803D', dot: '#16A34A' },
    'Build ready': { bg: '#F0FDF4', text: '#15803D', dot: '#16A34A' },
    Testing:       { bg: '#F0FDFA', text: '#0F766E', dot: '#14B8A6' },
    Expired:       { bg: T.muted,   text: T.textLt,   dot: T.textXlt },
  };
  const s = map[status] || map.Queued;
  return (
    <span style={{ background: s.bg, color: s.text, display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 9px', borderRadius: 99, fontSize: 11, fontWeight: 500, whiteSpace: 'nowrap' }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: s.dot, display: 'inline-block', flexShrink: 0 }} />
      {status}
    </span>
  );
};

/* Demo error toggle */
const DemoToggle = ({ label, on, onChange }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
    <span style={{ fontSize: 11, color: T.textXlt }}>{label}</span>
    <button onClick={() => onChange(!on)} style={{
      width: 32, height: 18, borderRadius: 99, border: 'none',
      background: on ? T.red : '#D1D5DB', cursor: 'pointer', position: 'relative', flexShrink: 0,
      transition: 'background .2s',
    }}>
      <span style={{
        position: 'absolute', top: 2, left: on ? 14 : 2,
        width: 14, height: 14, borderRadius: '50%', background: '#fff',
        transition: 'left .2s', boxShadow: '0 1px 2px rgba(0,0,0,.2)',
      }} />
    </button>

/* Inline copy button — self-contained copy state */
const CopyButton = ({ text }) => {
  const [copied, setCopied] = useState(false);
  const doCopy = () => {
    navigator.clipboard?.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button onClick={doCopy} style={{ flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13, fontWeight: 500, color: T.blue, background: T.blue50, border: `1px solid ${T.blue100}`, borderRadius: 8, padding: '7px 14px', cursor: 'pointer', fontFamily: 'Outfit, Inter, sans-serif' }}>
      <Ic n="copy" sz={13} col={T.blue} />{copied ? 'Copied!' : 'Copy link'}
    </button>
  );
};

  const [screen,     setScreen]     = useState(1);
  const [s1Blocker,  setS1Blocker]  = useState(false);
  const [s1TestBuild,setS1TestBuild]= useState(false);
  const [s1RelBuild, setS1RelBuild] = useState(false);
  const [s1TestReady,setS1TestReady]= useState(false);
  const [s1RelReady, setS1RelReady] = useState(false);
  const [s1Failed,   setS1Failed]   = useState(false);
  const [setupMode,  setSetupMode]  = useState(false);
  const [step1Done,  setStep1Done]  = useState(false);
  const [step2Done,  setStep2Done]  = useState(false);
  const [setupDone,  setSetupDone]  = useState(false);

  const go = n => setScreen(n);
  const clearBuildState = () => { setS1TestBuild(false); setS1RelBuild(false); setS1TestReady(false); setS1RelReady(false); setS1Failed(false); };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden', fontFamily: 'Outfit, Inter, ui-sans-serif, system-ui' }}>
      <TopNav screen={screen} goHome={() => go(1)} />
      <main style={{ flex: 1, overflowY: 'auto', background: T.pageBg }}>
        {screen === 1 && setupMode  && <S0 step1Done={step1Done} step2Done={step2Done} setupDone={setupDone} />}
        {screen === 1 && !setupMode && <S1 go={go} blocker={s1Blocker} testBuild={s1TestBuild} relBuild={s1RelBuild} testReady={s1TestReady} relReady={s1RelReady} failed={s1Failed} />}
        {screen === 2 && <S2 go={go} onStart={() => { clearBuildState(); setS1TestBuild(true); }} />}
        {screen === 3 && <S3 go={go} onStart={() => { clearBuildState(); setS1RelBuild(true); }} />}
        {screen === 4 && <S4 go={go} />}
      </main>
      {screen === 1 && (
        <DemoPanel
          blocker={s1Blocker}        setBlocker={setS1Blocker}
          testBuild={s1TestBuild}    setTestBuild={setS1TestBuild}
          relBuild={s1RelBuild}      setRelBuild={setS1RelBuild}
          testReady={s1TestReady}    setTestReady={setS1TestReady}
          relReady={s1RelReady}      setRelReady={setS1RelReady}
          failed={s1Failed}          setFailed={setS1Failed}
          setupMode={setupMode}  setSetupMode={setSetupMode}
          step1Done={step1Done}  setStep1Done={setStep1Done}
          step2Done={step2Done}  setStep2Done={setStep2Done}
          setupDone={setupDone}  setSetupDone={setSetupDone}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
